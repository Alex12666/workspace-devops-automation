name: Deploy Frontend AWS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # 1. Autenticação na AWS para o GitHub Actions (Runner)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      # 2. Login no Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. Build e Push da Imagem
      - name: Build and Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-imagem
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 4. SSH e Deploy - Versão Corrigida
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Definimos as variáveis de ambiente aqui
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # O parâmetro 'envs' diz ao SSH para levar essas variáveis lá para dentro
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,ECR_REGISTRY
          script: |
            # Instalação de dependências (caso necessário)
            if ! command -v docker &> /dev/null; then
              sudo apt-get update -y && sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi
            if ! command -v aws &> /dev/null; then
              sudo apt-get update -y && sudo apt-get install -y awscli
            fi

            # Login no ECR usando as chaves injetadas
            aws ecr get-login-password --region us-east-2 | sudo docker login --username AWS --password-stdin $ECR_REGISTRY
            
            # Atualização do Container
            sudo docker stop frontend-app || true
            sudo docker rm frontend-app || true
            sudo docker pull $ECR_REGISTRY/my-imagem:latest
            sudo docker run -d --name frontend-app -p 80:80 $ECR_REGISTRY/my-imagem:latest