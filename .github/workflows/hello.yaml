name: Deploy Frontend AWS

on:
  push:
    branches:
      - main # Confira se sua branch é 'main' ou 'master'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # 1. Autenticação na AWS para o GitHub Actions
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      # 2. Login no Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. Build e Push da Imagem
      - name: Build and Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-imagem
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 4. SSH e Deploy com Injeção de Credenciais
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Passa as chaves para dentro do ambiente SSH
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          script: |
            # Instala Docker se não existir
            if ! command -v docker &> /dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            # Instala AWS CLI se não existir
            if ! command -v aws &> /dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y awscli
            fi

            # Exporta as chaves para o AWS CLI local da máquina usar
            export AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
            export AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
            export AWS_DEFAULT_REGION=us-east-2

            # Login no ECR dentro da máquina usando as chaves exportadas
            aws ecr get-login-password --region us-east-2 | sudo docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            # Limpa containers antigos
            sudo docker stop frontend-app || true
            sudo docker rm frontend-app || true
            
            # Pull e Run (Usa o registro vindo do step de login)
            sudo docker pull ${{ steps.login-ecr.outputs.registry }}/my-imagem:latest
            sudo docker run -d --name frontend-app -p 80:80 ${{ steps.login-ecr.outputs.registry }}/my-imagem:latest