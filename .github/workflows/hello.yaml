name: Deploy Frontend AWS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # 1. Autenticação na AWS para o GitHub Actions
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      # 2. Login no Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. Build e Push da Imagem
      - name: Build and Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-imagem
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 4. SSH e Deploy - Usando Token de Autenticação Direto
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Passamos o token já gerado pelo step de login para evitar erro de assinatura
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_PASSWORD: ${{ steps.login-ecr.outputs.docker_password_960956258767_dkr_ecr_us_east_2_amazonaws_com }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ECR_REGISTRY,ECR_PASSWORD
          script: |
            # Instalação rápida do Docker (se necessário)
            if ! command -v docker &> /dev/null; then
              sudo apt-get update -y && sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo usermod -aG docker ubuntu
            fi

            # Login no Docker usando o Token injetado (Evita usar o AWS CLI na máquina)
            echo "$ECR_PASSWORD" | sudo docker login --username AWS --password-stdin $ECR_REGISTRY
            
            # Atualização do Container
            sudo docker stop frontend-app || true
            sudo docker rm frontend-app || true
            
            # Pull e Run
            sudo docker pull $ECR_REGISTRY/my-imagem:latest
            sudo docker run -d --name frontend-app -p 80:80 $ECR_REGISTRY/my-imagem:latest